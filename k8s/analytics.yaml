apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-config
data:
  low-memory.xml: |
    <clickhouse>
        <max_server_memory_usage>1300000000</max_server_memory_usage>
        <mark_cache_size>268435456</mark_cache_size>
        <uncompressed_cache_size>134217728</uncompressed_cache_size>
        <max_concurrent_queries>20</max_concurrent_queries>
    </clickhouse>
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: clickhouse-data
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clickhouse
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: {app: clickhouse}
  template:
    metadata:
      labels: {app: clickhouse}
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24.8
          ports:
            - {containerPort: 8123}
            - {containerPort: 9000}
          env:
            - name: CLICKHOUSE_DB
              value: analytics
            - name: CLICKHOUSE_USER
              value: analytics
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef: {name: clickhouse-credentials, key: CLICKHOUSE_PASSWORD}
          volumeMounts:
            - {name: data, mountPath: /var/lib/clickhouse}
            - {name: config, mountPath: /etc/clickhouse-server/config.d/low-memory.xml, subPath: low-memory.xml}
          readinessProbe:
            httpGet: {path: /ping, port: 8123}
            initialDelaySeconds: 10
          resources:
            requests: {memory: "512Mi", cpu: "100m"}
            limits: {memory: "1536Mi", cpu: "1000m"}
      volumes:
        - name: data
          persistentVolumeClaim: {claimName: clickhouse-data}
        - name: config
          configMap: {name: clickhouse-config}
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
spec:
  selector: {app: clickhouse}
  ports:
    - {name: http, port: 8123, targetPort: 8123}
    - {name: native, port: 9000, targetPort: 9000}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
spec:
  replicas: 1
  selector:
    matchLabels: {app: analytics-service}
  template:
    metadata:
      labels: {app: analytics-service}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: app
          image: dinuar/analytics-service-img:v2
          ports: [{containerPort: 8000}]
          env:
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef: {name: clickhouse-credentials, key: CLICKHOUSE_PASSWORD}
          readinessProbe:
            httpGet: {path: /health, port: 8000}
            initialDelaySeconds: 5
          resources:
            requests: {memory: "64Mi", cpu: "25m"}
            limits: {memory: "160Mi", cpu: "250m"}
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
spec:
  selector: {app: analytics-service}
  ports: [{port: 80, targetPort: 8000}]
