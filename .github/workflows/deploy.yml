name: frontend-blue-green

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'Dockerfile'
      - 'k8s/frontend-rollout.yaml'
  workflow_dispatch:

jobs:
  build-and-deploy-green:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute image tag from commit
        id: tag
        run: echo "tag=sha-$(echo $GITHUB_SHA | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
	  file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/newevent-frontend:${{ steps.tag.outputs.tag }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Open SSH to this runner only
        id: sg
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "ip=$RUNNER_IP" >> "$GITHUB_OUTPUT"
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ vars.SG_ID }} \
            --protocol tcp --port 22 --cidr ${RUNNER_IP}/32

      - name: Deploy new version as Green
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            kubectl argo rollouts set image frontend \
              nginx=${{ secrets.DOCKERHUB_USERNAME }}/newevent-frontend:${{ steps.tag.outputs.tag }}
            kubectl argo rollouts get rollout frontend

      - name: Close SSH
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ vars.SG_ID }} \
            --protocol tcp --port 22 --cidr ${{ steps.sg.outputs.ip }}/32
