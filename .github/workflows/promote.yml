name: promote-frontend

on:
  workflow_dispatch:

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Open SSH to this runner only
        id: sg
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "ip=$RUNNER_IP" >> "$GITHUB_OUTPUT"
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ vars.SG_ID }} \
            --protocol tcp --port 22 --cidr ${RUNNER_IP}/32

      - name: Promote Green to Active
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            kubectl argo rollouts promote frontend
            kubectl argo rollouts get rollout frontend

      - name: Close SSH
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ vars.SG_ID }} \
            --protocol tcp --port 22 --cidr ${{ steps.sg.outputs.ip }}/32
